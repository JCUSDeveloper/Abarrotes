services:
  - type: web
    name: abarrotes-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: pnpm install --frozen-lockfile && pnpm deploy:build
    startCommand: pnpm start:deploy
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
